name: CI Pipeline

on:
  push:
    branches:
      - master

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install deps
        run: |
          npm ci
          npx playwright install --with-deps

      - name: Check style       
        run: npm run eslint

      - name: Run unit tests
        run: npm test

      - name: Run e2e tests
        run: npm run test:e2e
